name: DailyRings
options:
  bundleIdPrefix: com.kai.dailyrings
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  DailyRings:
    type: application
    platform: iOS
    sources:
      - path: DailyRings
        excludes:
          - Extensions/**
      - path: Shared
    dependencies:
      - package: Supabase
        product: Supabase
      - target: DailyRingsMonitorExtension
      - target: DailyRingsReportExtension
    settings:
      base:
        INFOPLIST_FILE: DailyRings/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kai.dailyrings
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DailyRings/Resources/DailyRings.entitlements
    entitlements:
      path: DailyRings/Resources/DailyRings.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.kai.dailyrings
    info:
      path: DailyRings/Resources/Info.plist
      properties:
        CFBundleDisplayName: Daily Rings
        NSHealthShareUsageDescription: "Daily Rings reads your exercise and sleep data to track your daily activity rings."
        NSCameraUsageDescription: "Daily Rings uses the camera to photograph your meals for nutrition scoring."
        NSPhotoLibraryUsageDescription: "Daily Rings can import meal photos from your library."
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        BGTaskSchedulerPermittedIdentifiers:
          - com.kai.dailyrings.refresh
        UIBackgroundModes:
          - fetch

  DailyRingsMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DailyRings/Extensions/DeviceActivityMonitorExtension
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: DailyRings/Extensions/DeviceActivityMonitorExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kai.dailyrings.monitor
        CODE_SIGN_ENTITLEMENTS: DailyRings/Extensions/DeviceActivityMonitorExtension/Monitor.entitlements
        ENABLE_PREVIEWS: NO
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -O
          GCC_OPTIMIZATION_LEVEL: s
    info:
      path: DailyRings/Extensions/DeviceActivityMonitorExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivity.monitor-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PomodoroActivityMonitor
    entitlements:
      path: DailyRings/Extensions/DeviceActivityMonitorExtension/Monitor.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.kai.dailyrings

  DailyRingsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailyRingsTests
    dependencies:
      - target: DailyRings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kai.dailyrings.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DailyRings.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DailyRings"
        BUNDLE_LOADER: "$(TEST_HOST)"

  DailyRingsReportExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DailyRings/Extensions/DeviceActivityReportExtension
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: DailyRings/Extensions/DeviceActivityReportExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kai.dailyrings.report
        CODE_SIGN_ENTITLEMENTS: DailyRings/Extensions/DeviceActivityReportExtension/Report.entitlements
        ENABLE_PREVIEWS: NO
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -O
          GCC_OPTIMIZATION_LEVEL: s
    info:
      path: DailyRings/Extensions/DeviceActivityReportExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.deviceactivityreport
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PomodoroUsageReport
    entitlements:
      path: DailyRings/Extensions/DeviceActivityReportExtension/Report.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.kai.dailyrings
